# mkdocs-material site over the generated skill + reference docs.
# Build:  uv run ue-mcp-skills build      (wraps `mkdocs build --strict`, output -> ./site)
# Serve:  uv run ue-mcp-skills build --serve   (http://127.0.0.1:8000)
#
# docs_dir points at the per-engine skill folder, so the same Markdown is BOTH the
# agent-loadable skill and the rendered website — no duplicated content. Pin to the
# UE version you want to publish; bump when a new engine snapshot is the "headline".
# Multi-version site (one URL per engine) is planned via mkdocs-mike.
site_name: "UE Official MCP — Skill & Reference (UE 5.8.0)"
site_description: "Generated reference for the official Unreal Engine 5.8.0 ModelContextProtocol toolsets, plus the ue-official-mcp-5.8.0 skill."
# site_url tells mkdocs the deployment base path. Without it, internal links and
# Material-theme JS resolve to the domain root (/) instead of /ue-official-mcp/,
# which breaks the site on GitHub Pages project deployments.
site_url: https://tc-imba.github.io/ue-official-mcp/
docs_dir: skills/ue-official-mcp-5.8.0
site_dir: site

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

# The curated domain files and per-toolset raw files are reached via links from
# the two index pages rather than enumerated in the nav (so regeneration never
# requires editing this file). Tell --strict those omitted pages are intentional.
validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn

nav:
  - Home: index.md
  - Skill: SKILL.md
  - Reference hub: references/index.md
  - Raw toolset catalog: references/toolsets/index.md
